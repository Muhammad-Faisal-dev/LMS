<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #4a69bd;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #3b5998;
        }
        .response {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow: auto;
            font-family: monospace;
        }
        .error {
            background: #ffebee;
            border: 1px solid #ef9a9a;
            color: #c62828;
        }
    </style>
</head>
<body>
    <h1>API Test Tool</h1>
    
    <div class="form-group">
        <label for="endpoint">Endpoint:</label>
        <input type="text" id="endpoint" value="/api/auth/login">
    </div>
    
    <div class="form-group">
        <label for="method">Method:</label>
        <select id="method">
            <option value="GET">GET</option>
            <option value="POST" selected>POST</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="body">Request Body (JSON):</label>
        <textarea id="body" rows="10">{
  "email": "admin@example.com",
  "password": "password123"
}</textarea>
    </div>
    
    <button id="send">Send Request</button>
    
    <div class="response" id="response" style="display: none;"></div>
    
    <h2>Common Test Cases</h2>
    <button class="test-case" data-endpoint="/api/auth/register" data-method="POST" data-body='{
  "name": "Test User",
  "email": "test@example.com",
  "password": "password123",
  "role": "student"
}'>Register User</button>

    <button class="test-case" data-endpoint="/api/auth/login" data-method="POST" data-body='{
  "email": "test@example.com",
  "password": "password123"
}'>Login</button>

    <button class="test-case" data-endpoint="/api/auth/me" data-method="GET" data-body=''>Get Current User</button>

    <script>
        document.getElementById('send').addEventListener('click', sendRequest);
        
        // Add event listeners to test case buttons
        document.querySelectorAll('.test-case').forEach(button => {
            button.addEventListener('click', () => {
                document.getElementById('endpoint').value = button.dataset.endpoint;
                document.getElementById('method').value = button.dataset.method;
                document.getElementById('body').value = button.dataset.body;
            });
        });
        
        function sendRequest() {
            const endpoint = document.getElementById('endpoint').value;
            const method = document.getElementById('method').value;
            const bodyEl = document.getElementById('body');
            const responseEl = document.getElementById('response');
            
            responseEl.style.display = 'none';
            responseEl.classList.remove('error');
            
            let body;
            try {
                body = bodyEl.value.trim() ? JSON.parse(bodyEl.value) : undefined;
            } catch (e) {
                responseEl.textContent = 'Error: Invalid JSON in request body';
                responseEl.style.display = 'block';
                responseEl.classList.add('error');
                return;
            }
            
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };
            
            // Add Authorization header if there's a stored token
            const token = localStorage.getItem('token');
            if (token) {
                options.headers['Authorization'] = `Bearer ${token}`;
            }
            
            // Add body for POST requests
            if (method === 'POST' && body) {
                options.body = JSON.stringify(body);
            }
            
            fetch(endpoint, options)
                .then(async response => {
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(`${response.status}: ${data.message || data.error || 'Unknown error'}`);
                    }
                    
                    // If this was a successful login, store the token
                    if (endpoint.includes('/login') && data.token) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        console.log('Saved token to localStorage');
                    }
                    
                    responseEl.textContent = JSON.stringify(data, null, 2);
                    responseEl.style.display = 'block';
                })
                .catch(error => {
                    responseEl.textContent = `Error: ${error.message}`;
                    responseEl.style.display = 'block';
                    responseEl.classList.add('error');
                });
        }
    </script>
</body>
</html>
